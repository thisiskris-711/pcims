<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - PCIMS</title>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#007bff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PCIMS" />
    <link rel="manifest" href="/pcims/manifest.json" />
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/pcims/images/pc-logo-2.png" />
    <link
      rel="apple-touch-icon"
      sizes="152x152"
      href="/pcims/images/pc-logo-2.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="192x192"
      href="/pcims/images/pc-logo-2.png"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/pcims/images/pc-logo-2.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/pcims/images/pc-logo-2.png"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      .offline-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }

      .offline-card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 60px 40px;
        text-align: center;
        max-width: 500px;
        width: 100%;
        backdrop-filter: blur(10px);
      }

      .offline-icon {
        font-size: 80px;
        color: #dc3545;
        margin-bottom: 30px;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
        100% {
          transform: scale(1);
        }
      }

      .offline-title {
        font-size: 2rem;
        font-weight: 700;
        color: #333;
        margin-bottom: 20px;
      }

      .offline-message {
        font-size: 1.1rem;
        color: #666;
        margin-bottom: 30px;
        line-height: 1.6;
      }

      .offline-actions {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .btn-retry {
        background: linear-gradient(45deg, #007bff, #0056b3);
        border: none;
        padding: 15px 30px;
        font-size: 1.1rem;
        font-weight: 600;
        border-radius: 50px;
        transition: all 0.3s ease;
      }

      .btn-retry:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(0, 123, 255, 0.3);
      }

      .btn-offline {
        background: #6c757d;
        border: none;
        padding: 12px 25px;
        font-size: 1rem;
        border-radius: 50px;
        transition: all 0.3s ease;
      }

      .btn-offline:hover {
        background: #5a6268;
        transform: translateY(-2px);
      }

      .connection-status {
        margin-top: 30px;
        padding: 15px;
        border-radius: 10px;
        background: #f8f9fa;
      }

      .status-indicator {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        margin-right: 8px;
      }

      .status-offline {
        background: #dc3545;
        animation: blink 1s infinite;
      }

      .status-online {
        background: #28a745;
      }

      @keyframes blink {
        0%,
        50% {
          opacity: 1;
        }
        51%,
        100% {
          opacity: 0.3;
        }
      }

      .cached-data-info {
        margin-top: 20px;
        padding: 15px;
        background: #e7f3ff;
        border-radius: 10px;
        border-left: 4px solid #007bff;
      }

      .cached-data-info h6 {
        color: #0056b3;
        margin-bottom: 10px;
      }

      .cached-data-info p {
        margin: 0;
        color: #666;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="offline-container">
      <div class="offline-card">
        <div class="offline-icon">
          <i class="fas fa-wifi-slash"></i>
        </div>

        <h1 class="offline-title">You're Offline</h1>

        <p class="offline-message">
          It looks like you've lost your internet connection. Some features may
          be limited until you're back online.
        </p>

        <div class="offline-actions">
          <button class="btn btn-primary btn-retry" onclick="retryConnection()">
            <i class="fas fa-sync-alt me-2"></i>Try Again
          </button>

          <button
            class="btn btn-secondary btn-offline"
            onclick="viewOfflineData()"
          >
            <i class="fas fa-database me-2"></i>View Cached Data
          </button>
        </div>

        <div class="connection-status">
          <div class="d-flex align-items-center justify-content-between">
            <span>
              <span
                class="status-indicator status-offline"
                id="statusIndicator"
              ></span>
              <span id="statusText">Checking connection...</span>
            </span>
            <small class="text-muted" id="lastChecked">Never</small>
          </div>
        </div>

        <div class="cached-data-info" id="cachedDataInfo" style="display: none">
          <h6><i class="fas fa-info-circle me-2"></i>Offline Mode</h6>
          <p>
            You can still view previously loaded data. Any changes will be
            synced when you're back online.
          </p>
        </div>
      </div>
    </div>

    <script>
      let retryCount = 0;
      const maxRetries = 5;

      // Check connection status
      function checkConnection() {
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const lastChecked = document.getElementById('lastChecked');

        if (navigator.onLine) {
          // Try to fetch a small resource to confirm actual connectivity
          fetch('/favicon.ico', {
            method: 'HEAD',
            cache: 'no-cache',
          })
            .then(() => {
              statusIndicator.className = 'status-indicator status-online';
              statusText.textContent = 'Connected';
              lastChecked.textContent = new Date().toLocaleTimeString();

              // Redirect to dashboard if connected
              setTimeout(() => {
                window.location.href = '/dashboard.php';
              }, 1000);
            })
            .catch(() => {
              updateOfflineStatus();
            });
        } else {
          updateOfflineStatus();
        }
      }

      function updateOfflineStatus() {
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const lastChecked = document.getElementById('lastChecked');

        statusIndicator.className = 'status-indicator status-offline';
        statusText.textContent = 'Offline';
        lastChecked.textContent = new Date().toLocaleTimeString();
      }

      // Retry connection
      function retryConnection() {
        if (retryCount >= maxRetries) {
          alert(
            'Maximum retry attempts reached. Please check your connection and try again later.',
          );
          return;
        }

        retryCount++;
        const retryBtn = document.querySelector('.btn-retry');
        const originalText = retryBtn.innerHTML;

        retryBtn.innerHTML =
          '<i class="fas fa-spinner fa-spin me-2"></i>Checking...';
        retryBtn.disabled = true;

        setTimeout(() => {
          checkConnection();
          retryBtn.innerHTML = originalText;
          retryBtn.disabled = false;
        }, 2000);
      }

      // View offline data
      function viewOfflineData() {
        const cachedDataInfo = document.getElementById('cachedDataInfo');
        cachedDataInfo.style.display =
          cachedDataInfo.style.display === 'none' ? 'block' : 'none';

        // Try to load cached data from IndexedDB
        if ('indexedDB' in window) {
          loadCachedData();
        }
      }

      // Load cached data from IndexedDB
      function loadCachedData() {
        const request = indexedDB.open('pcims-offline', 1);

        request.onsuccess = function (event) {
          const db = event.target.result;

          if (db.objectStoreNames.contains('dashboard-cache')) {
            const transaction = db.transaction(['dashboard-cache'], 'readonly');
            const store = transaction.objectStore('dashboard-cache');
            const getRequest = store.get('latest');

            getRequest.onsuccess = function () {
              const data = getRequest.result;
              if (data) {
                console.log('Cached data available:', data);
                // You could display cached stats here
              }
            };
          }
        };
      }

      // Listen for online/offline events
      window.addEventListener('online', function () {
        console.log('App is now online');
        checkConnection();
      });

      window.addEventListener('offline', function () {
        console.log('App is now offline');
        updateOfflineStatus();
      });

      // Check connection on page load
      window.addEventListener('load', function () {
        checkConnection();

        // Auto-retry every 30 seconds
        setInterval(checkConnection, 30000);
      });

      // Service Worker messaging for sync status
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.addEventListener('message', function (event) {
          if (event.data && event.data.type === 'SYNC_STATUS') {
            console.log('Sync status:', event.data.status);
          }
        });
      }
    </script>
  </body>
</html>
